services:
  postgres:
    env_file: .env
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uzchess
  backend:
    env_file: .env
    build: .
    container_name: uzchess
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - ${PORT}:${PORT}
    networks:
      - uzchess
networks:
  uzchess:
    driver: bridge
volumes:
  uploads:
  postgres_data: